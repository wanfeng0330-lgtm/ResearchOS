name: pytest

on:
  pull_request:
    paths:
      - 'scripts/adapters/**'
      - 'scripts/check_literature_corpus_schema.py'
      - 'scripts/check_corpus_consumer_protocol.py'
      - 'scripts/sync_adapter_docs.py'
      - 'shared/contracts/passport/**'
      - 'academic-pipeline/references/adapters/**'
      - 'academic-pipeline/references/literature_corpus_consumers.md'
      - 'deep-research/agents/bibliography_agent.md'
  push:
    branches: [main]
    paths:
      - 'scripts/adapters/**'
      - 'scripts/check_literature_corpus_schema.py'
      - 'scripts/check_corpus_consumer_protocol.py'
      - 'scripts/sync_adapter_docs.py'
      - 'shared/contracts/passport/**'
      - 'academic-pipeline/references/adapters/**'
      - 'academic-pipeline/references/literature_corpus_consumers.md'
      - 'deep-research/agents/bibliography_agent.md'

concurrency:
  # Suffix by event_name so push (branches: [main]) and pull_request
  # events don't fight over the same group on the rare case both fire.
  group: pytest-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt pytest

      - name: Run adapter tests
        env:
          PYTHONPATH: .
        run: pytest scripts/adapters/tests/ -v
